const shellScriptSource=document.currentScript.textContent;
const root=document.getElementById('app-root'),boot=document.getElementById('boot');
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=()=>{const d=r.result;if(!d.objectStoreNames.contains('meta'))d.createObjectStore('meta',{keyPath:'key'});if(!d.objectStoreNames.contains('units'))d.createObjectStore('units',{keyPath:'id'});if(!d.objectStoreNames.contains('progress'))d.createObjectStore('progress',{keyPath:'id'});if(!d.objectStoreNames.contains('sessions'))d.createObjectStore('sessions',{keyPath:'id'})};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)})}
function tx(store,mode='readonly'){return db.transaction(store,mode).objectStore(store)}
const api={
 get:(s,k)=>new Promise((res,rej)=>{const r=tx(s).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)}),
 all:s=>new Promise((res,rej)=>{const r=tx(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)}),
 put:(s,v)=>new Promise((res,rej)=>{const r=tx(s,'readwrite').put(v);r.onsuccess=()=>res(v);r.onerror=()=>rej(r.error)}),
 delete:(s,k)=>new Promise((res,rej)=>{const r=tx(s,'readwrite').delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)})
};
const metaGet=async k=>(await api.get('meta',k))?.value;
const metaPut=(k,v)=>api.put('meta',{key:k,value:v});
const metaDelete=k=>api.delete('meta',k);
function decodeBundle(b64){return JSON.parse(new TextDecoder().decode(Uint8Array.from(atob(b64),c=>c.charCodeAt(0))))}
function encodeBundle(b){return btoa(String.fromCharCode(...new TextEncoder().encode(JSON.stringify(b))))}
function sha256Fallback(ascii){function rightRotate(value,amount){return(value>>>amount)|(value<<(32-amount))}let mathPow=Math.pow,maxWord=mathPow(2,32),lengthProperty='length',i,j,result='',words=[],asciiBitLength=ascii[lengthProperty]*8,hash=sha256Fallback.h=sha256Fallback.h||[],k=sha256Fallback.k=sha256Fallback.k||[],primeCounter=k[lengthProperty],isComposite={};for(let candidate=2;primeCounter<64;candidate++){if(!isComposite[candidate]){for(i=0;i<313;i+=candidate)isComposite[i]=candidate;hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0}}ascii+='\x80';while(ascii[lengthProperty]%64-56)ascii+='\x00';for(i=0;i<ascii[lengthProperty];i++){j=ascii.charCodeAt(i);if(j>>8)return '';words[i>>2]|=j<<((3-i)%4)*8}words[words[lengthProperty]]=(asciiBitLength/maxWord)|0;words[words[lengthProperty]]=asciiBitLength;for(j=0;j<words[lengthProperty];){let w=words.slice(j,j+=16),oldHash=hash;hash=hash.slice(0,8);for(i=0;i<64;i++){let i2=i+j,w15=w[i-15],w2=w[i-2],a=hash[0],e0=hash[4],temp1=hash[7]+(rightRotate(e0,6)^rightRotate(e0,11)^rightRotate(e0,25))+((e0&hash[5])^((~e0)&hash[6]))+k[i]+(w[i]=(i<16)?w[i]:(w[i-16]+(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))+w[i-7]+(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0),temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));hash=[(temp1+temp2)|0,a,hash[1],hash[2],(hash[3]+temp1)|0,e0,hash[5],hash[6]]}for(i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0}for(i=0;i<8;i++)for(j=3;j+1;j--){let b=(hash[i]>>(j*8))&255;result+=(b<16?'0':'')+b.toString(16)}return result}async function sha256Text(text){if(globalThis.crypto&&crypto.subtle){const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(text));return[...new Uint8Array(h)].map(x=>x.toString(16).padStart(2,'0')).join('')}return sha256Fallback(unescape(encodeURIComponent(text)))}
function semver(v){return String(v||'0.0.0').replace(/^v/,'').split('.').map(x=>parseInt(x)||0)}
function cmp(a,b){const A=semver(a),B=semver(b);for(let i=0;i<3;i++){if(A[i]>B[i])return 1;if(A[i]<B[i])return-1}return 0}

function extractUpdate(text){const t=text.trim();let o;if(t.startsWith('{'))o=JSON.parse(t);else{const d=new DOMParser().parseFromString(t,'text/html'),s=d.querySelector('#andy-quiz-factory-update');if(!s)throw Error('업데이트 HTML 내부에 andy-quiz-factory-update 데이터가 없음');o=JSON.parse(s.textContent)}return o}
async function inspectUpdate(text,source=''){const p=extractUpdate(text),current=(await metaGet('appBundle')).version;if(p.packageType!=='andy-quiz-factory-update')throw Error('지원하지 않는 업데이트 패키지 유형');if(p.appId!==APP_ID)throw Error('다른 앱용 업데이트 파일임');if(!satisfies(current,p.fromVersion))throw Error(`현재 버전 ${current}과 호환되지 않음. 요구 버전: ${p.fromVersion}`);if(cmp(p.toVersion,current)<=0)throw Error(`새 버전이 현재 버전보다 높지 않음. 현재 ${current}, 패키지 ${p.toVersion}`);if(!p.bundleBase64)throw Error('업데이트 앱 번들이 없음');const raw=new TextDecoder().decode(Uint8Array.from(atob(p.bundleBase64),c=>c.charCodeAt(0))),hash=await sha256Text(raw);if(p.sha256&&hash!==p.sha256)throw Error('무결성 검사 실패: SHA-256 값이 일치하지 않음');const b=JSON.parse(raw);if(b.version!==p.toVersion)throw Error('패키지 버전과 번들 버전이 다름');return {...p,source,verifiedHash:hash,bundle:b}}

async function rollback(){const prev=await metaGet('previousBundles')||[];if(!prev.length)throw Error('되돌릴 이전 버전이 없음');const current=await metaGet('appBundle'),next=prev.shift();prev.unshift(current);await metaPut('previousBundles',prev.slice(0,3));await metaPut('appBundle',next);return next}
async function fetchText(url){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw Error(`HTTP ${r.status}`);return r.text()}
function download(name,text,type='text/plain'){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
async function downloadPortableHtml(){const b=await metaGet('appBundle'),b64=encodeBundle(b),css=document.getElementById('shell-style').textContent,js=shellScriptSource.replace(/const DEFAULT_BUNDLE_B64='[^']*';/,`const DEFAULT_BUNDLE_B64='${b64}';`);const html=`<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Andy의 퀴즈 공장"><meta name="theme-color" content="#f3f3ef"><title>Andy의 퀴즈 공장</title><style id="shell-style">${css}</style></head><body><div id="boot" class="boot"><div class="boot-card"><h1>Andy의 퀴즈 공장</h1><div class="spinner"></div><p>앱을 불러오는 중…</p></div></div><div id="app-root" hidden></div><script id="shell-script">${js}<\/script></body></html>`;download(`andy_quiz_factory_v${b.version}.html`,html,'text/html')}
async function getTechnicalInfo(){const b=await metaGet('appBundle'),prev=await metaGet('previousBundles')||[],hist=await metaGet('updateHistory')||[],units=await api.all('units');return {appId:APP_ID,currentVersion:b.version,dataSchemaVersion:'1.0',bundleSchemaVersion:b.schemaVersion,previousVersions:prev.map(x=>x.version),unitCount:units.length,questionCount:units.reduce((a,u)=>a+(u.questions?.length||0),0),recentUpdates:hist.slice(0,10),generatedAt:new Date().toISOString()}}
function mount(bundle){document.getElementById('dynamic-style')?.remove();const st=document.createElement('style');st.id='dynamic-style';st.textContent=bundle.css;document.head.appendChild(st);boot.hidden=true;root.hidden=false;root.innerHTML='';const bridge={root,all:api.all,put:api.put,delete:api.delete,get:api.get,metaGet,metaPut,metaDelete,fetchText,inspectUpdate,applyUpdate,rollback,getTechnicalInfo,downloadPortableHtml};new Function('APP_BRIDGE',bundle.js)(bridge)}
